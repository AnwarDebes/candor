<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="CANDOR logo: a glass-box Legible Bottleneck holding a sparse named concept code with a measured leak, sealed by a Faithfulness Certificate check.">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2e2a"/>
      <stop offset="0.6" stop-color="#0e5e54"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="lift" cx="0.3" cy="0.18" r="0.8">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect width="256" height="256" rx="58" fill="url(#tile)"/>
  <rect width="256" height="256" rx="58" fill="url(#lift)"/>
  <rect x="6" y="6" width="244" height="244" rx="54" fill="none" stroke="#aef3e7" stroke-width="1.5" opacity="0.22"/>

  <!-- glass bottleneck panel -->
  <rect x="44" y="60" width="168" height="116" rx="22" fill="#ffffff" fill-opacity="0.09"
        stroke="#7fe7d8" stroke-width="2" opacity="0.95"/>

  <!-- beam in (the opaque activation entering the channel) -->
  <circle cx="34" cy="98" r="5" fill="#cdeee8"/>
  <path d="M40 98 L60 98" fill="none" stroke="#cdeee8" stroke-width="3" stroke-linecap="round"/>

  <!-- sparse named concept code: a few lit atoms among dim ones -->
  <g>
    <rect x="66" y="118" width="14" height="30" rx="4" fill="none" stroke="#8fded1" stroke-width="2" opacity="0.55"/>
    <rect x="180" y="120" width="14" height="28" rx="4" fill="none" stroke="#8fded1" stroke-width="2" opacity="0.55"/>
    <rect x="92"  y="94"  width="16" height="54" rx="4" fill="#2dd4bf"/>
    <rect x="116" y="80"  width="16" height="68" rx="4" fill="#5eead4"/>
    <rect x="140" y="104" width="16" height="44" rx="4" fill="#34d399"/>
  </g>

  <!-- the measured leak (kept, not discarded) -->
  <path d="M62 160 L178 160" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"/>

  <!-- faithfulness certificate seal -->
  <circle cx="190" cy="178" r="34" fill="#08231f" stroke="#34d399" stroke-width="3.4"/>
  <circle cx="190" cy="178" r="34" fill="none" stroke="#34d399" stroke-width="7" opacity="0.16"/>
  <path d="M175 178 L186 190 L206 165" fill="none" stroke="#6ee7b7" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
